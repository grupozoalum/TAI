    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #16243F 0%, #1e3358 100%);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .loader {
            padding: 40px;
            max-width: 400px;
        }
        .loader-dot {
            width: 12px; height: 12px;
            background: #00A58E;
            border-radius: 50%;
            display: inline-block;
            margin: 0 4px;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .loader-dot:nth-child(2) { animation-delay: 0.2s; }
        .loader-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); opacity:0.4; }
            40% { transform: scale(1); opacity:1; }
        }
        h2 { font-size: 1.4rem; margin: 20px 0 10px; letter-spacing: 1px; }
        p { opacity: 0.65; font-size: 0.88rem; line-height: 1.6; }
        a { color: #00A58E; text-decoration: none; font-weight: 700; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="loader">
        <div>
            <span class="loader-dot"></span>
            <span class="loader-dot"></span>
            <span class="loader-dot"></span>
        </div>
